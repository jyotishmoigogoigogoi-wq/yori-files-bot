<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Yori Federation Vault</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="antialiased bg-[var(--tg-theme-secondary-bg-color)]">
    <!-- Main App -->
    <div id="app" class="hidden flex flex-col h-screen">
        
        <!-- Header & Storage Bar -->
        <header class="bg-[var(--tg-theme-bg-color)] px-4 pt-3 pb-2 shadow-sm sticky top-0 z-10">
            <div class="flex items-center justify-between mb-2">
                <div class="flex items-center gap-2 overflow-x-auto no-scrollbar whitespace-nowrap text-sm" id="breadcrumbs"></div>
                <button id="btn-store" class="text-[10px] font-bold bg-gradient-to-r from-yellow-400 to-orange-500 text-white px-2 py-1 rounded shadow">STORE</button>
            </div>
            <!-- Storage Progress -->
            <div class="w-full bg-[var(--tg-theme-secondary-bg-color)] rounded-full h-1.5 mb-1">
                <div id="storage-bar" class="bg-[var(--tg-theme-button-color)] h-1.5 rounded-full" style="width: 0%"></div>
            </div>
            <div class="text-[10px] text-[var(--tg-theme-hint-color)] text-right" id="storage-text">0 GB / 50 GB</div>
            
            <!-- Tools (Search & Sort) -->
            <div class="flex gap-2 mt-2">
                <div class="relative flex-1">
                    <i class="ph ph-magnifying-glass absolute left-2 top-1.5 text-[var(--tg-theme-hint-color)]"></i>
                    <input type="text" id="search-input" placeholder="Search..." class="w-full bg-[var(--tg-theme-secondary-bg-color)] text-[var(--tg-theme-text-color)] text-xs rounded px-8 py-1.5 outline-none">
                </div>
                <select id="sort-select" class="bg-[var(--tg-theme-secondary-bg-color)] text-[var(--tg-theme-text-color)] text-xs rounded px-2 outline-none border-none">
                    <option value="name">A-Z</option>
                    <option value="date">Newest</option>
                    <option value="size">Largest</option>
                </select>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-4 pb-32" id="vault-content"></main>

        <!-- Modals and Overlays -->
        <div id="store-modal" class="hidden fixed inset-0 z-50 bg-black bg-opacity-50 flex items-center justify-center p-4">
            <div class="bg-[var(--tg-theme-bg-color)] w-full max-w-sm rounded-xl p-6 text-center shadow-xl">
                <i class="ph ph-crown text-5xl text-yellow-500 mb-2"></i>
                <h2 class="text-xl font-bold text-[var(--tg-theme-text-color)] mb-4">Upgrade Storage</h2>
                <p class="text-sm text-[var(--tg-theme-hint-color)] mb-6">Need more space? Buy a permanent expansion. Added directly to your account instantly.</p>
                <div class="flex flex-col gap-3 mb-6">
                    <button class="w-full border border-[var(--tg-theme-button-color)] text-[var(--tg-theme-button-color)] rounded-lg py-2 font-bold">+5 GB (159 INR)</button>
                    <button class="w-full bg-[var(--tg-theme-button-color)] text-white rounded-lg py-2 font-bold shadow">+10 GB (200 INR)</button>
                </div>
                <a href="https://t.me/yorichiiprime" target="_blank" class="block w-full bg-gray-800 text-white rounded-lg py-3 font-bold mb-3"><i class="ph ph-telegram-logo mr-1"></i> Contact Admin to Buy</a>
                <button onclick="document.getElementById('store-modal').classList.add('hidden')" class="text-[var(--tg-theme-hint-color)] text-sm">Close</button>
            </div>
        </div>

        <div id="paste-bar" class="hidden fixed bottom-20 left-1/2 transform -translate-x-1/2 bg-[var(--tg-theme-button-color)] text-white px-6 py-3 rounded-full shadow-xl flex items-center gap-4 z-40">
            <span class="text-sm font-bold"><span id="paste-count">0</span> items copied</span>
            <button id="btn-do-paste" class="bg-white text-[var(--tg-theme-button-color)] px-3 py-1 rounded text-xs font-bold">PASTE HERE</button>
            <i class="ph ph-x text-lg cursor-pointer" onclick="clearClipboard()"></i>
        </div>

        <!-- Selection / Context / Image Viewer / Audio Player (Added via JS) -->
        <div id="image-viewer" class="hidden fixed inset-0 z-[60] bg-black flex flex-col">
            <div class="p-4 flex justify-between text-white items-center bg-gradient-to-b from-black/70 to-transparent">
                <i class="ph ph-arrow-left text-2xl cursor-pointer" onclick="closeViewer()"></i>
                <span id="iv-name" class="text-sm truncate px-4"></span>
                <i class="ph ph-download-simple text-2xl cursor-pointer" id="iv-dl"></i>
            </div>
            <div class="flex-1 flex items-center justify-center p-2">
                <img id="iv-img" class="max-w-full max-h-full object-contain">
            </div>
        </div>

        <div id="audio-player" class="hidden fixed bottom-0 left-0 right-0 bg-[var(--tg-theme-bg-color)] p-4 shadow-[0_-10px_20px_rgba(0,0,0,0.2)] z-[60] border-t border-[var(--tg-theme-hint-color)] border-opacity-20 flex flex-col">
            <div class="flex justify-between items-center mb-2">
                <span id="ap-name" class="text-sm font-bold text-[var(--tg-theme-text-color)] truncate pr-4"></span>
                <i class="ph ph-x-circle text-xl text-[var(--tg-theme-hint-color)] cursor-pointer" onclick="closeAudio()"></i>
            </div>
            <audio id="ap-audio" controls class="w-full outline-none h-10"></audio>
        </div>

        <!-- Selection Action Bar -->
        <div id="selection-bar" class="hidden fixed bottom-0 left-0 right-0 bg-[var(--tg-theme-bg-color)] shadow-xl p-4 px-2 flex items-center justify-between z-30 border-t border-[var(--tg-theme-hint-color)] border-opacity-20 transition-transform duration-200 translate-y-full">
            <div class="text-[var(--tg-theme-text-color)] font-medium text-xs px-2"><span id="selected-count">0</span> Selected</div>
            <div class="flex gap-2">
                <button id="btn-cut" class="text-[var(--tg-theme-text-color)] flex flex-col items-center"><i class="ph ph-scissors text-xl"></i><span class="text-[10px]">Cut</span></button>
                <button id="btn-copy" class="text-[var(--tg-theme-text-color)] flex flex-col items-center"><i class="ph ph-copy text-xl"></i><span class="text-[10px]">Copy</span></button>
                <button id="btn-zip" class="text-[var(--tg-theme-button-color)] flex flex-col items-center"><i class="ph ph-file-zip text-xl"></i><span class="text-[10px]">ZIP</span></button>
                <button id="btn-bulk-delete" class="text-red-500 flex flex-col items-center"><i class="ph ph-trash text-xl"></i><span class="text-[10px]">Delete</span></button>
                <button id="btn-cancel-select" class="text-[var(--tg-theme-hint-color)] flex flex-col items-center"><i class="ph ph-x text-xl"></i><span class="text-[10px]">Close</span></button>
            </div>
        </div>

        <!-- Context Menu Overlay -->
        <div id="context-menu" class="hidden fixed bg-[var(--tg-theme-bg-color)] shadow-xl rounded-xl py-2 z-50 border border-[var(--tg-theme-hint-color)] border-opacity-20 text-[var(--tg-theme-text-color)] text-sm min-w-[160px]">
            <div id="ctx-rename" class="px-4 py-3 flex items-center gap-3 active:bg-[var(--tg-theme-secondary-bg-color)]"><i class="ph ph-pencil-simple text-lg"></i> Rename</div>
            <div id="ctx-download" class="px-4 py-3 flex items-center gap-3 active:bg-[var(--tg-theme-secondary-bg-color)]"><i class="ph ph-download-simple text-lg"></i> Download</div>
            <div id="ctx-delete" class="px-4 py-3 flex items-center gap-3 text-red-500 active:bg-[var(--tg-theme-secondary-bg-color)]"><i class="ph ph-trash text-lg"></i> Delete</div>
        </div>

        <!-- FABs -->
        <div id="fab-container" class="fixed bottom-6 right-6 flex flex-col gap-3 z-20 transition-transform duration-200">
            <button id="btn-create-folder" class="w-12 h-12 bg-[var(--tg-theme-button-color)] text-[var(--tg-theme-button-text-color)] rounded-full shadow-lg flex items-center justify-center active:scale-95 transition-transform"><i class="ph ph-folder-plus text-2xl"></i></button>
            <button id="btn-upload" class="w-14 h-14 bg-[var(--tg-theme-button-color)] text-[var(--tg-theme-button-text-color)] rounded-full shadow-lg flex items-center justify-center relative active:scale-95 transition-transform">
                <i class="ph ph-upload-simple text-3xl"></i>
                <input type="file" id="file-input" class="absolute inset-0 opacity-0 cursor-pointer" multiple>
            </button>
        </div>
    </div>
    <script src="/static/app.js"></script>
</body>
</html>
